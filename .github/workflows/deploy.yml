# Builds the SPA and publishes the dist/ folder to GitHub Pages on every
# push to main. Pages is configured (in repo Settings → Pages) to source
# from "GitHub Actions"; this workflow is the producer.
#
# The `postinstall` script copies our vendor-rebuilt triangle-wasm into
# node_modules/, so `npm ci` is enough — no extra step required.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deployments use OIDC; these three scopes are the canonical set.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time. Don't cancel an in-progress run — let it
# finish so the published site reflects a complete build.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
